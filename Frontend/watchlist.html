<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Watchlist | AniStrim</title>
  <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile-native.css">
</head>
<body>
<div id="side-menu" class="side-nav">
  <div class="menu-header"><button class="close-btn" onclick="toggleMenu()">✕</button></div>
  <ul class="menu-links">
    <li onclick="location.href='index.html'">🏠 Home</li>
    <li onclick="location.href='browse.html'">🔍 Browse</li>
    <li class="active" onclick="location.href='watchlist.html'">📋 My List</li>
    <li onclick="location.href='upgrade.html'">👑 Premium</li>
    <li onclick="location.href='profile.html'">👤 Profile</li>
    <li onclick="handleSignOut()" style="color:#ef4444;">🚪 Sign Out</li>
  </ul>
</div>
<div id="menu-overlay" class="overlay" onclick="toggleMenu()"></div>

<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">
    <div class="logo-icon">A</div>
    <span class="logo-text">Ani<span>Strim</span></span>
  </div>
  <div class="nav-icons">
    <button class="nav-icon-btn" onclick="location.href='browse.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="nav-icon-btn" onclick="toggleMenu()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<div class="watchlist-header">
  <h1>My Watchlist</h1>
  <p id="wl-count">Loading...</p>
</div>

<div class="watchlist-tabs">
  <button class="wl-tab active" onclick="filterWL('All', this)">All</button>
  <button class="wl-tab" onclick="filterWL('Watching', this)">Watching</button>
  <button class="wl-tab" onclick="filterWL('Plan to Watch', this)">Plan to Watch</button>
  <button class="wl-tab" onclick="filterWL('Completed', this)">Completed</button>
  <button class="wl-tab" onclick="filterWL('Dropped', this)">Dropped</button>
</div>

<div class="watchlist-list" id="watchlist-list"></div>

<nav class="mobile-bottom-nav">
  <a href="index.html" class="mob-nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></a>
  <a href="browse.html" class="mob-nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Browse</span></a>
  <a href="watchlist.html" class="mob-nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>My List</span></a>
  <a href="profile.html" class="mob-nav-item"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
</nav>
<script src="scrpt.js"></script>
<script src="watchlist.js"></script>
</body>
</html>

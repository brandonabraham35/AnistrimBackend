<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | AniStrim</title>
  <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile-native.css">
</head>
<body class="auth-body">
<div class="auth-box">
  <div class="auth-logo">
    <div class="auth-logo-icon">A</div>
    <h1>Ani<span>Strim</span></h1>
    <p>Reset your password</p>
  </div>

  <div id="forgot-form">
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="forgot-email" placeholder="you@example.com">
    </div>
    <button class="auth-submit" onclick="handleForgot()">Send Reset Link</button>
    <div class="auth-links"><a href="login.html">← Back to Sign In</a></div>
  </div>

  <div id="forgot-success" style="display:none; text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:12px;">📧</div>
    <h3 style="margin-bottom:8px;">Check your email</h3>
    <p style="font-size:0.85rem;color:var(--text-dim);line-height:1.6;margin-bottom:20px;">
      We've sent a password reset link to your email.<br>
      <strong style="color:var(--purple);" id="dev-link-display"></strong>
    </p>
    <a href="login.html" class="btn-primary" style="text-decoration:none;justify-content:center;">Back to Sign In</a>
  </div>
</div>

<script src="scrpt.js"></script>
<script>
async function handleForgot() {
  const email = document.getElementById('forgot-email')?.value?.trim();
  if (!email) { showError('Please enter your email.'); return; }

  const btn = document.querySelector('.auth-submit');
  btn.textContent = 'Sending...'; btn.disabled = true;

  const res  = await fetch('https://anistrimbackend.onrender.com/api/auth/forgot-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });
  const data = await res.json();

  document.getElementById('forgot-form').style.display = 'none';
  document.getElementById('forgot-success').style.display = 'block';

  // Dev mode: show the reset link directly
  if (data.dev_link) {
    document.getElementById('dev-link-display').textContent = '(Dev) ' + data.dev_link;
  }
}
window.handleForgot = handleForgot;

function showError(msg) {
  let el = document.getElementById('auth-error');
  if (!el) {
    el = document.createElement('p'); el.id = 'auth-error';
    el.style.cssText = 'color:#f87171;font-size:0.85rem;text-align:center;margin-bottom:10px;';
    document.querySelector('.auth-submit').before(el);
  }
  el.textContent = msg;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AniStrim</title>
  <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile-native.css">
</head>
<body class="auth-body">
<div class="auth-box">
  <div class="auth-logo">
    <div class="auth-logo-icon">A</div>
    <h1>New Password</h1>
    <p>Choose a strong password</p>
  </div>

  <div class="input-group">
    <label>New Password</label>
    <div class="password-wrapper">
      <input type="password" id="new-pass" placeholder="••••••••">
      <button class="toggle-pw" onclick="togglePasswordVisibility('new-pass')">👁️</button>
    </div>
  </div>
  <div class="input-group">
    <label>Confirm Password</label>
    <input type="password" id="confirm-pass" placeholder="••••••••">
  </div>
  <button class="auth-submit" onclick="handleReset()">Reset Password</button>
  <div class="auth-links"><a href="login.html">← Back to Sign In</a></div>
</div>

<script src="scrpt.js"></script>
<script>
async function handleReset() {
  const token    = new URLSearchParams(window.location.search).get('token');
  const newPass  = document.getElementById('new-pass').value;
  const confirm  = document.getElementById('confirm-pass').value;

  if (!token)            { showError('Invalid reset link.'); return; }
  if (newPass.length < 6){ showError('Password must be at least 6 characters.'); return; }
  if (newPass !== confirm){ showError('Passwords do not match.'); return; }

  const btn = document.querySelector('.auth-submit');
  btn.textContent = 'Resetting...'; btn.disabled = true;

  const res  = await fetch('https://anistrimbackend.onrender.com/api/auth/reset-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, newPassword: newPass })
  });
  const data = await res.json();

  if (res.ok) {
    alert('✅ ' + data.message);
    location.href = 'login.html';
  } else {
    showError(data.message || 'Reset failed.');
    btn.textContent = 'Reset Password'; btn.disabled = false;
  }
}
window.handleReset = handleReset;

function showError(msg) {
  let el = document.getElementById('auth-error');
  if (!el) {
    el = document.createElement('p'); el.id = 'auth-error';
    el.style.cssText = 'color:#f87171;font-size:0.85rem;text-align:center;margin-bottom:10px;';
    document.querySelector('.auth-submit').before(el);
  }
  el.textContent = msg;
}
</script>
</body>
</html>

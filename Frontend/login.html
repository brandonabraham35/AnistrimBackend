<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com; frame-src https://accounts.google.com;">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AniStrim</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile-native.css">
  <style>
    /* Override plain white Google button with anime dark style */
    .google-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a0a2e 0%, #0d0520 100%) !important;
      border: 1.5px solid #6c2bd9 !important;
      border-radius: 12px !important;
      padding: 14px 20px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 12px !important;
      cursor: pointer !important;
      position: relative !important;
      overflow: hidden !important;
      transition: all 0.3s ease !important;
      box-shadow: 0 0 20px rgba(108, 43, 217, 0.25) !important;
      color: #fff !important;
      font-size: 0.95rem !important;
      font-weight: 600 !important;
      margin-bottom: 20px !important;
    }
    .google-btn:hover {
      box-shadow: 0 0 30px rgba(108, 43, 217, 0.5) !important;
      border-color: #9d6fff !important;
      transform: translateY(-1px) !important;
      opacity: 1 !important;
    }
    .google-btn img { display: none !important; } /* hide old image */
    .google-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(108,43,217,0.15), transparent);
      transform: skewX(-20deg);
      animation: gbtn-shimmer 3s infinite;
    }
    @keyframes gbtn-shimmer {
      0%   { left: -100%; }
      100% { left: 200%; }
    }
  </style>
  </head>
<body class="auth-body">
<div class="auth-box">
  <div class="auth-logo">
    <div class="auth-logo-icon">A</div>
    <h1>Ani<span>Strim</span></h1>
    <p>Sign in to continue</p>
  </div>

<button class="google-btn" onclick="googleLogin()">
    <!-- Google G icon -->
    <span style="width:26px;height:26px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 8px rgba(108,43,217,0.4);">
      <svg width="15" height="15" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
    </span>
    Continue with Google
  </button>

  <div class="divider"><span>OR</span></div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@example.com">
  </div>
  <div class="input-group">
    <label>Password</label>
    <div class="password-wrapper">
      <input type="password" id="login-pass" placeholder="••••••••">
      <button class="toggle-pw" onclick="togglePasswordVisibility('login-pass')">👁️</button>
    </div>
  </div>

  <button class="auth-submit" onclick="handleLogin()">Sign In</button>

  <div class="auth-links">
    <a href="forgot-password.html">Forgot password?</a><br>
    Need an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script src="scrpt.js"></script>
<script src="google-auth-handler.js"></script>
<script src="login.js"></script>
</body>
</html>
